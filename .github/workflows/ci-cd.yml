name: 🎮 Kesra CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ─── LINT & STATIC ANALYSIS ───
  lint:
    name: 🔍 GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GDScript Toolkit
        run: |
          pip install gdtoolkit
      - name: Lint GDScript
        run: |
          gdlint src/ || true  # Non-blocking for now
  
  # ─── BUILD (Godot 4.x) ───
  build:
    name: 🏗️ Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        platform: [linux, windows, web]
        include:
          - platform: linux
            export_preset: Linux/X11
            artifact_name: kesra-linux.zip
          - platform: windows
            export_preset: Windows Desktop
            artifact_name: kesra-windows.zip
          - platform: web
            export_preset: Web
            artifact_name: kesra-web.zip
    steps:
      - uses: actions/checkout@v4
      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 godot
          chmod +x godot
      - name: Export ${{ matrix.platform }}
        run: |
          mkdir -p build/${{ matrix.platform }}
          ./godot --headless --export-debug "${{ matrix.export_preset }}" build/${{ matrix.platform }}/kesra
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/${{ matrix.platform }}

  # ─── MOBILE BUILD ───
  mobile:
    name: 📱 Mobile Build
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        platform: [android]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Download Godot 4.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 godot
          chmod +x godot
      - name: Export Android
        run: |
          mkdir -p build/android
          ./godot --headless --export-debug "Android" build/android/kesra.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kesra-android.apk
          path: build/android/kesra.apk

  # ─── RELEASE ───
  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-latest
    needs: [build, mobile]
    if: github.event_name == 'release'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  # ─── WEB DEPLOY (GitHub Pages) ───
  deploy-web:
    name: 🌐 Deploy Web Version
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: kesra-web.zip
      - name: Extract & Deploy to Pages
        run: |
          unzip -q kesra-web.zip -d public
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  
  deploy-pages:
    name: 📄 GitHub Pages
    runs-on: ubuntu-latest
    needs: [deploy-web]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
