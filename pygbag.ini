[pygbag]
title = كِسرة — Egyptian Brick-Breaker
version = 0.2
description = Infinite Egyptian brick-breaker — endless worlds, no level cap.
author = Lord1Egypt
icon = assets/ui/kesra_logo.svg

# Files/dirs to exclude from the web bundle
ignore_dirs = build, .git, __pycache__, levels, .github
ignore_files = *.md, *.sh, create_*.py, setup_*.py, git_push.py, .gitignore

# Canvas size matches game resolution
width = 480
height = 720
