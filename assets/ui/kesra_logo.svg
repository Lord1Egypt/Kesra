<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0018"/>
      <stop offset="100%" stop-color="#1a0030"/>
    </linearGradient>
    <linearGradient id="gld" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7a5a00"/>
      <stop offset="35%"  stop-color="#ffd700"/>
      <stop offset="65%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#7a5a00"/>
    </linearGradient>
    <linearGradient id="tGld" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff4a0"/>
      <stop offset="45%"  stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#9a7000"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="220" rx="16" fill="url(#bg)"/>

  <!-- Outer gold border -->
  <rect x="2.5" y="2.5" width="595" height="215" rx="14.5" fill="none" stroke="url(#gld)" stroke-width="2.5"/>

  <!-- Inner subtle border -->
  <rect x="8" y="8" width="584" height="204" rx="11" fill="none" stroke="#3a2500" stroke-width="1"/>

  <!-- Stars -->
  <circle cx="22"  cy="22"  r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="578" cy="22"  r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="22"  cy="198" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="578" cy="198" r="1.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="55"  cy="40"  r="1"   fill="#ffd700" opacity="0.3"/>
  <circle cx="545" cy="40"  r="1"   fill="#ffd700" opacity="0.3"/>
  <circle cx="300" cy="18"  r="1"   fill="#ffd700" opacity="0.4"/>
  <circle cx="300" cy="202" r="1"   fill="#ffd700" opacity="0.4"/>

  <!-- Horizontal divider lines -->
  <line x1="140" y1="38"  x2="460" y2="38"  stroke="#c9a227" stroke-width="0.8" opacity="0.5"/>
  <line x1="140" y1="182" x2="460" y2="182" stroke="#c9a227" stroke-width="0.8" opacity="0.5"/>

  <!-- Center diamond ornaments -->
  <polygon points="300,30 308,38 300,46 292,38" fill="#c9a227" opacity="0.75"/>
  <polygon points="300,174 308,182 300,190 292,182" fill="#c9a227" opacity="0.75"/>

  <!-- Left pyramid -->
  <polygon points="32,185  72,108  112,185" fill="#120820" stroke="#c9a227" stroke-width="1.2"/>
  <line x1="72" y1="108" x2="72"  y2="185" stroke="#c9a227" stroke-width="0.6" opacity="0.45"/>
  <line x1="52" y1="147" x2="92"  y2="147" stroke="#c9a227" stroke-width="0.6" opacity="0.35"/>
  <line x1="42" y1="166" x2="102" y2="166" stroke="#c9a227" stroke-width="0.6" opacity="0.25"/>
  <!-- Eye of Horus glyph (simplified) above left pyramid -->
  <ellipse cx="72" cy="94" rx="8" ry="5" fill="none" stroke="#ffd700" stroke-width="0.9" opacity="0.6"/>
  <circle  cx="72" cy="94" r="2.5" fill="#ffd700" opacity="0.6"/>

  <!-- Right pyramid (mirror) -->
  <polygon points="488,185  528,108  568,185" fill="#120820" stroke="#c9a227" stroke-width="1.2"/>
  <line x1="528" y1="108" x2="528" y2="185" stroke="#c9a227" stroke-width="0.6" opacity="0.45"/>
  <line x1="508" y1="147" x2="548" y2="147" stroke="#c9a227" stroke-width="0.6" opacity="0.35"/>
  <line x1="498" y1="166" x2="558" y2="166" stroke="#c9a227" stroke-width="0.6" opacity="0.25"/>
  <ellipse cx="528" cy="94" rx="8" ry="5" fill="none" stroke="#ffd700" stroke-width="0.9" opacity="0.6"/>
  <circle  cx="528" cy="94" r="2.5" fill="#ffd700" opacity="0.6"/>

  <!-- Glowing ball icon (left of text) -->
  <circle cx="148" cy="110" r="10" fill="#ffd700" opacity="0.15" filter="url(#glow)"/>
  <circle cx="148" cy="110" r="6"  fill="#fff4a0" opacity="0.85"/>

  <!-- Glowing ball icon (right of text) -->
  <circle cx="452" cy="110" r="10" fill="#ffd700" opacity="0.15" filter="url(#glow)"/>
  <circle cx="452" cy="110" r="6"  fill="#fff4a0" opacity="0.85"/>

  <!-- Small brick decorations -->
  <rect x="130" y="104" width="12" height="7" rx="1.5" fill="#7a3500" stroke="#c9a227" stroke-width="0.6" opacity="0.7"/>
  <rect x="458" y="104" width="12" height="7" rx="1.5" fill="#7a3500" stroke="#c9a227" stroke-width="0.6" opacity="0.7"/>

  <!-- MAIN TITLE — Arabic كِسرة -->
  <text x="300" y="128"
        text-anchor="middle"
        font-family="'Tahoma','Traditional Arabic','Arabic Typesetting','Scheherazade New',serif"
        font-size="90"
        font-weight="bold"
        fill="url(#tGld)"
        filter="url(#textglow)">كِسرة</text>

  <!-- English subtitle -->
  <text x="300" y="163"
        text-anchor="middle"
        font-family="'Georgia','Times New Roman',serif"
        font-size="14"
        fill="#c9a227"
        letter-spacing="5"
        opacity="0.85">EGYPTIAN  BRICK-BREAKER</text>

  <!-- Infinity symbol -->
  <text x="300" y="185"
        text-anchor="middle"
        font-family="Arial,sans-serif"
        font-size="11"
        fill="#ffd700"
        opacity="0.55"
        letter-spacing="2">∞  INFINITE  WORLDS  •  NO  ENDING  ∞</text>
</svg>
